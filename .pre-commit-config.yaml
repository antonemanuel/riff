repos:
  - repo: local
    hooks:
      - id: ruff-format
        name: ruff format (check)
        entry: uv run ruff format --check
        language: system
        types_or: [python, pyi]
        pass_filenames: false
      - id: ruff-check
        name: ruff lint
        entry: uv run ruff check
        language: system
        types_or: [python, pyi]
        pass_filenames: false
      - id: ty
        name: ty type check
        entry: uv run ty check --error-on-warning
        language: system
        types_or: [python, pyi]
        pass_filenames: false
      - id: yamllint
        name: yamllint
        entry: uv run yamllint .
        language: system
        types: [yaml]
        pass_filenames: false
